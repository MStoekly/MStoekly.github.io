  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-dark-soft)}\n  .kpi.feat .tag{color:var(--teal)}\n  .spark-svg{position:absolute;right:18px;top:22px;width:46px;height:20px;opacity:.5}\n\n  /* PROJECT CARDS */\n  .proj-list{display:flex;flex-direction:column;gap:14px}\n  .card{background:var(--surface-card);border:1px solid var(--hairline);border-radius:13px;overflow:hidden;transition:border-color .2s,box-shadow .2s}\n  .card.live{background:var(--canvas);border-color:var(--cream-strong)}\n  .card:hover{border-color:var(--primary);box-shadow:0 10px 30px -16px rgba(24,23,21,.22)}\n  .card-head{display:flex;align-items:center;gap:18px;padding:22px 26px;cursor:pointer;width:100%;text-align:left;background:none;border:0;font-family:inherit}\n  .card-idx{font-family:var(--mono);font-size:12px;color:var(--muted-soft);width:28px;flex:none}\n  .card-tt{flex:1;min-width:0}\n  .card-tt h3{font-size:19px;font-weight:600;letter-spacing:-0.015em;line-height:1.25}\n  .card-tt .ct-sub{font-size:13.5px;color:var(--muted);margin-top:3px}\n  .badge{font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:9999px;flex:none}\n  .badge.live{background:var(--primary);color:#fff}\n  .badge.case{background:var(--cream-strong);color:var(--body-strong)}\n  .chev{width:20px;height:20px;flex:none;color:var(--muted);transition:transform .25s}\n  .card.open .chev{transform:rotate(180deg)}\n  .card-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}\n  .card-body-inner{padding:2px 26px 26px 72px}\n  @media(max-width:560px){.card-body-inner{padding:2px 22px 24px 22px}.card-head{padding:18px 20px}}\n  .card-body p{font-size:15.5px;color:var(--body);line-height:1.6;max-width:70ch}\n  .card-body .insight{margin-top:14px;padding:14px 16px;background:var(--surface-soft);border-left:3px solid var(--primary);border-radius:0 8px 8px 0;font-size:14.5px;color:var(--body-strong)}\n  .card.live .card-body .insight{background:var(--surface-card)}\n  .card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-top:18px}\n  .stack{display:flex;flex-wrap:wrap;gap:7px}\n  .chip{font-family:var(--mono);font-size:11.5px;color:var(--body);background:var(--canvas);border:1px solid var(--hairline);padding:4px 10px;border-radius:6px}\n  .card.live .chip{background:var(--surface-soft)}\n  .view-link{font-size:13.5px;font-weight:600;color:var(--primary-active);display:inline-flex;align-items:center;gap:6px}\n  .view-link:hover{text-decoration:underline}\n  .view-link svg{width:14px;height:14px}\n\n  /* EXPERIENCE TIMELINE */\n  .tl{position:relative;padding-left:26px}\n  .tl::before{content:\"\";position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;background:var(--hairline)}\n  .tl-item{position:relative;padding-bottom:34px}\n  .tl-item:last-child{padding-bottom:0}\n  .tl-item::before{content:\"\";position:absolute;left:-26px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px var(--canvas)}\n  .tl-item .role{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ink)}\n  .tl-item .org{font-size:14.5px;color:var(--body-strong);margin-top:2px}\n  .tl-item .when{font-family:var(--mono);font-size:12px;color:var(--muted-soft);margin-top:4px;display:block}\n  .tl-item ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:7px}\n  .tl-item li{font-size:14.5px;color:var(--body);padding-left:18px;position:relative;line-height:1.5;max-width:68ch}\n  .tl-item li::before{content:\"–\";position:absolute;left:0;color:var(--primary)}\n\n  /* TWO-COL (skills/lang) */\n  .cols{display:grid;grid-template-columns:1.3fr 1fr;gap:48px}\n  @media(max-width:780px){.cols{grid-template-columns:1fr;gap:40px}}\n  .skill-group{margin-bottom:22px}\n  .skill-group h4{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:11px}\n  .skill-group .stack .chip{font-family:var(--sans);font-size:13px;padding:6px >\n\n<script>\nconst I18N = {\n  nav_projects:{pt:\"Projetos\",en:\"Projects\"},\n  nav_exp:{pt:\"Experiência\",en:\"Experience\"},\n  nav_skills:{pt:\"Competências\",en:\"Skills\"},\n  nav_contact:{pt:\"Contato\",en:\"Contact\"},\n  hero_eyebrow:{pt:\"Analista de Dados de Negócios\",en:\"Business Data Analyst\"},\n  hero_h1:{pt:\"Transformo dados complexos em decisões claras.\",en:\"I turn complex data into clear decisions.\"},\n  hero_lead:{pt:\"Tenho formação em <em>negócios<\u002Fem>, não em TI — então enxergo o problema antes da ferramenta. Domino SQL, Power BI e dashboards, mas penso com a cabeça de administrador, não de engenheiro. Já atuei no setor público e no privado pegando dado bagunçado e transformando em decisão que a liderança de fato usa.\",en:\"A <em>business<\u002Fem>-trained analyst, not an IT one — I read the problem before the tool. Strong in SQL, Power BI and dashboards, with the analytical and economic lens of an administrator. Public and private sector work turning messy data into decisions leaders actually use.\"},\n  cta_projects:{pt:\"Ver projetos\",en:\"View projects\"},\n  cta_linkedin:{pt:\"Conectar no LinkedIn\",en:\"Connect on LinkedIn\"},\n\n  kpi_eyebrow:{pt:\"A carreira em números\",en:\"Career at a glance\"},\n  kpi_title:{pt:\"Um analista lido como um dashboard.\",en:\"One analyst, read as a dashboard.\"},\n  kpi_1:{pt:\"do passivo de fretes zerado em 5 meses, ao automatizar um processo manual\",en:\"of the freight backlog cleared in 5 months by automating a manual process\"},\n  kpi_2:{pt:\"de ganho na ocupação dos contêineres por embarque\",en:\"gain in container utilization per shipment\"},\n  kpi_3:{pt:\"plano de aplicação de recursos monitorado com precisão de auditoria — virou pauta no G1\",en:\"public-spending plan tracked with audit-grade precision — covered by G1's investigative desk\"},\n  kpi_4:{pt:\"ciclo de relatório que caiu de uma semana para quatro horas\",en:\"reporting cycle compressed from a week to four hours\"},\n  kpi_5:{pt:\"de inconsistências nos dados, com pipelines de ETL e trilhas de auditoria\",en:\"data inconsistencies, via ETL pipelines with audit trails\"},\n  kpi_6:{pt:\"indicadores ponderados destrinchados no Ranking de Competitividade dos Estados (CLP)\",en:\"weighted indicators decoded in the CLP state competitiveness ranking\"},\n\n  proj_eyebrow:{pt:\"Estudos de caso\",en:\"Case studies\"},\n  proj_title:{pt:\"Projetos selecionados\",en:\"Selected projects\"},\n  proj_sub:{pt:\"Clique para ver o contexto, a abordagem e os dashboards ao vivo.\",en:\"Tap to open the context, the approach and the live dashboards.\"},\n\n  exp_eyebrow:{pt:\"Trajetória\",en:\"Track record\"},\n  exp_title:{pt:\"Experiência\",en:\"Experience\"},\n  exp_r1_when:{pt:\"fev 2023 — atual\",en:\"Feb 2023 — present\"},\n  exp_r2_when:{pt:\"jun 2022 — fev 2023\",en:\"Jun 2022 — Feb 2023\"},\n  exp_r1_role:{pt:\"Analista de Dados de Negócios\",en:\"Business Data Analyst\"},\n  exp_r1_org:{pt:\"Secretaria de Estado da Infraestrutura e Logística (SEIL) — Curitiba, PR\",en:\"State Department of Infrastructure & Logistics (SEIL) — Curitiba, Brazil\"},\n  exp_r1_b1:{pt:\"Fui o único analista de três departamentos, mais Compras e RH, evoluindo de dashboards operacionais até uma camada gerencial que chegava ao Secretário e ao Diretor-Geral.\",en:\"Sole analyst serving three departments plus Procurement and HR, building from operational dashboards up to a managerial layer seen by the State Secretary and Director-General.\"},\n  exp_r1_b2:{pt:\"Entreguei relatórios com precisão de auditoria sob o olhar do Tribunal de Contas e fiz a cultura de dados andar num ambiente que resistia a ela.\",en:\"Built audit-grade reporting under state-audit-court scrutiny and drove data adoption in a low-data-culture environment.\"},\n  exp_r1_b3:{pt:\"Automatizei pipelines de ETL em Power Query e SQL, com trilhas de auditoria e controle de acesso em tempo real.\",en:\"Automated ETL pipelines with Power Query and SQL, with audit trails and real-time access controls.\"},\n  exp_r2_role:{pt:\"Trainee de PC&L (Controle de Produção e Logística)\",en:\"PC&L Trainee (Production Control & Logistics)\"},\n  exp_r2_org:{pt:\"Faurecia — Curitiba, PR\",en:\"Faurecia — Curitiba, Brazil\"},\n  exp_r2_b1:{pt:\"Automatizei um processo manual de pagamento de fretes que tomava o dia inteiro de um analista; ele caiu para ~3h e o passivo encolheu ~97%.\",en:\"Automated a full-day manual freight-payment process down to ~3h, cutting the backlog by ~97%.\"},\n  exp_r2_b2:{pt:\"Com o tempo que sobrou, assumi a alocação de contêineres e elevei a ocupação por embarque em 86%.\",en:\"Reinvested the freed time into container allocation, improving utilization per shipment by 86%.\"},\n\n  skills_eyebrow:{pt:\"Ferramentas e forças\",en:\"Tools & strengths\"},\n  skills_title:{pt:\"Competências\",en:\"Skills\"},\n  skills_g1:{pt:\"Dados e BI\",en:\"Data & BI\"},\n  skills_g2:{pt:\"Análise\",en:\"Analysis\"},\n  skills_g3:{pt:\"Ferramentas\",en:\"Tooling\"},\n  skills_g4:{pt:\"Forças\",en:\"Strengths\"},\n  skill_modeling:{pt:\"Modelagem de Dados\",en:\"Data Modeling\"},\n  skill_gov:{pt:\"Governança de Dados\",en:\"Data Governance\"},\n  skill_kpi:{pt:\"Definição de KPIs\",en:\"KPI Design\"},\n  skill_stat:{pt:\"Análise Estatística\",en:\"Statistical Analysis\"},\n  skill_econ:{pt:\"Raciocínio Econômico\",en:\"Economic Reasoning\"},\n  skill_dash:{pt:\"Dashboards\",en:\"Dashboards\"},\n  skill_dev:{pt:\"(em desenv.)\",en:\"(developing)\"},\n  skill_adopt:{pt:\"Adoção de Dados\",en:\"Data Adoption\"},\n  skill_cross:{pt:\"Atuação Interdepartamental\",en:\"Cross-functional\"},\n  skill_solve:{pt:\"Resolução de Problemas\",en:\"Problem-Solving\"},\n\n  lang_eyebrow:{pt:\"Idiomas\",en:\"Languages\"},\n  lang_title:{pt:\"Comunicação\",en:\"Communication\"},\n  lang_pt:{pt:\"Português\",en:\"Portuguese\"},\n  lang_pt_lvl:{pt:\"Nativo\",en:\"Native\"},\n  lang_en:{pt:\"Inglês\",en:\"English\"},\n  lang_es:{pt:\"Espanhol\",en:\"Spanish\"},\n  lang_es_lvl:{pt:\"B2 · Intermediário\",en:\"B2 · Intermediate\"},\n  lang_fr:{pt:\"Francês\",en:\"French\"},\n  lang_fr_lvl:{pt:\"B1 · Básico\",en:\"B1 · Basic\"},\n\n  edu_title:{pt:\"Formação\",en:\"Education\"},\n  edu_deg:{pt:\"Bacharelado em Negócios Internacionais\",en:\"Bachelor's in International Business\"},\n  edu_when:{pt:\"jan 2020 — dez 2023\",en:\"Jan 2020 — Dec 2023\"},\n  intl_title:{pt:\"Experiência internacional\",en:\"International experience\"},\n  intl_text:{pt:\"Do inglês básico ao avançado em 7 meses.\",en:\"English from beginner to advanced in 7 months.\"},\n  cert_title:{pt:\"Certificações\",en:\"Certifications\"},\n  cert_voss:{pt:\"A Arte da Negociação\",en:\"The Art of Negotiation\"},\n\n  foot_h:{pt:\"Vamos transformar seus dados em decisões.\",en:\"Let's turn your data into decisions.\"},\n  foot_role:{pt:\"Analista de Dados de Negócios\",en:\"Business Data Analyst\"},\n  foot_note:{pt:\"Curitiba, Brasil · Aberto a oportunidades remotas\",en:\"Curitiba, Brazil · Open to remote roles\"},\n};\n\nconst PROJECTS = [\n  {live:true, idx:\"01\",\n   t:{pt:\"Dashboard do Plano de Aplicação dos Recursos da Copel\",en:\"Copel Resource-Allocation Dashboard\"},\n   sub:{pt:\"Transparência pública · precisão de auditoria\",en:\"Public transparency · audit-grade\"},\n   body:{pt:\"O estado precisava mostrar à população como aplicaria o dinheiro da venda da Copel, e o plano estava sob o olhar do Tribunal de Contas. Montei o dashboard em poucas horas, com cada centavo batendo entre as Secretarias da Fazenda, Segurança e Educação — uma fórmula errada ali significava ter que responder ao Tribunal. O plano que ele acompanhava virou pauta de reportagem investigativa do G1 (Fiscaliza).\",en:\"When the state had to publish how proceeds from the Copel utility sale would be spent, the plan was under audit-court scrutiny and public-transparency pressure. I built the dashboard in hours — every cent reconciled across the Treasury, Security and Education departments. One wrong formula meant answering to the state audit court. The plan it tracked was the subject of G1's investigative coverage.\"},\n   insight:{pt:\"O mérito não estava na ferramenta, e sim na precisão sob pressão: zero margem para erro, dado sensível e prazo apertado.\",en:\"The value wasn't the tool — it was precision under stakes: zero margin for error, sensitive data, hard deadline.\"},\n   stack:[\"SQL\",\"Power BI\",\"Power Query\"],\n   url:\"https://app.powerbi.com/view?r=eyJrIjoiMWIyMDk5NDctOGJjNS00M2QwLThlYmQtODMzNGQxNDM4MjZmIiwidCI6IjZlY2NiMTczLTA1OTUtNGE3MS05OGI3LTE4ZDFmNDkyMzA4NCJ9\"},\n  {live:true, idx:\"02\",\n   t:{pt:\"Análise do Ranking de Competitividade dos Estados (CLP)\",en:\"CLP State Competitiveness Ranking Analysis\"},\n   sub:{pt:\"Benchmark · 10 pilares · ~100 indicadores\",en:\"Benchmarking · 10 pillars · ~100 indicators\"},\n   body:{pt:\"Destrinchei a metodologia do ranking — dez pilares e quase cem indicadores ponderados — para comparar as secretarias e expor onde o desempenho destoava. O trabalho fez várias secretarias abrirem mais os próprios dados e proporem projetos de melhoria.\",en:\"I decoded the ranking's methodology — ten pillars and roughly a hundred weighted indicators — to benchmark departments and surface performance gaps. The work pushed several departments to improve data transparency and propose corrective projects.\"},\n   insight:{pt:\"Ler com olho crítico um indicador fraco vale tanto quanto construir um bom: apontei onde a metodologia distorcia e onde ela realmente fazia sentido.\",en:\"Reading a weak metric critically matters as much as building a good one: I flagged where the methodology distorted and where it genuinely pointed.\"},\n   stack:[\"Power BI\",\"Power Query\",\"VBA\"],\n   url:\"https://app.powerbi.com/view?r=eyJrIjoiMjdmZjNlNjItODI0Ny00MWRiLTgzMDgtZTVhN2M5ZmI0NTViIiwidCI6IjZlY2NiMTczLTA1OTUtNGE3MS05OGI3LTE4ZDFmNDkyMzA4NCJ9\"},\n  {live:false, idx:\"03\",\n   t:{pt:\"O indicador que ninguém leu direito\",en:\"The indicator nobody read correctly\"},\n   sub:{pt:\"Segurança pública · raciocínio econômico\",en:\"Public safety · economic reasoning\"},\n   body:{pt:\"A liderança lia um indicador de segurança pública ao pé da letra. Percebi que era uma proporção com comportamento não-monotônico: ele sobe quando a repressão aumenta e depois cai, conforme a atividade deixa de compensar economicamente. Usei raciocínio econômico para mostrar que ele só faz sentido acompanhado ao longo do tempo, e não como número solto — o que evitou conclusões erradas no planejamento.\",en:\"Leadership was reading a public-safety indicator at face value. I identified it as a ratio with non-monotonic behavior: it should rise as enforcement increases, then fall as the underlying activity becomes economically unviable. I applied economic reasoning to show it must be tracked as a time series — not a single value — preventing flawed planning conclusions.\"},\n   insight:{pt:\"Cruzar economia, matemática e política num indicador só é justamente onde a minha formação em negócios me separa do analista puramente técnico.\",en:\"Connecting economics, math and policy in a single metric is exactly where my business background sets me apart from a purely technical analyst.\"},\n   stack:[\"Power BI\",{pt:\"Teoria econômica\",en:\"Economic theory\"},{pt:\"Modelagem\",en:\"Modeling\"}], url:null},\n  {live:false, idx:\"04\",\n   t:{pt:\"Adoção de dados em ambiente resistente\",en:\"Data adoption in a resistant environment\"},\n   sub:{pt:\"Estratégia de produto + comportamento\",en:\"Product + behavioral strategy\"},\n   body:{pt:\"Eu era uma espécie de consultor do Planejamento dentro da Infraestrutura — sem autoridade interna e com equipes pouco dispostas a ajudar. Em vez de levar o problema para cima, peguei os poucos dados que já existiam e transformei em BI que era de fato útil. A utilidade virou isca: quanto mais útil, mais (e melhores) dados as equipes passavam a entregar.\",en:\"Working as a Planning consultant embedded inside Infrastructure, I had no internal authority and teams were reluctant to help. Instead of escalating, I turned the scraps of existing data into useful BI products — creating an incentive loop where usefulness pulled more and better data from previously uncooperative teams.\"},\n   insight:{pt:\"Resolvi um problema político e comportamental com estratégia de produto. Poucos analistas têm uma resposta para \\u201Ccomo tirar dado de quem não quer dar\\u201D.\",en:\"I solved a political and behavioral problem with a product strategy. Few analysts have an answer to 'how do you get data from people who don't want to give it'.\"},\n   stack:[\"Power BI\",{pt:\"Gestão de stakeholders\",en:\"Stakeholder mgmt\"}], url:null},\n  {live:false, idx:\"05\",\n   t:{pt:\"Automação de fretes → segunda função\",en:\"Freight automation → second role\"},\n   sub:{pt:\"Faurecia · eficiência e iniciativa\",en:\"Faurecia · efficiency & initiative\"},\n   body:{pt:\"Automatizei (Excel VBA + SAP) um processo manual de pagamento de fretes e correção de ordens de compra que tomava o dia inteiro de um analista. Ele caiu para ~3 horas e o passivo encolheu ~97% em cinco meses. Com o tempo que sobrou, abracei uma segunda função — alocação de contêineres — e criei uma ferramenta de otimização que subiu a ocupação em 86%.\",en:\"I automated (Excel VBA + SAP) a manual freight-payment and PO-correction process that consumed an analyst's whole day, cutting it to ~3 hours and reducing the backlog by ~97% in five months. With the freed time I took on a second role — container allocation — and built an optimization tool that improved utilization by 86%.\"},\n   insight:{pt:\"Eu me automatizo para fora do trabalho repetitivo e uso o tempo que sobra para gerar mais valor. Resultado concreto em duas frentes ao mesmo tempo.\",en:\"I automate myself out of repetitive work and use the free time to create more value — concrete results in two areas at once.\"},\n   stack:[\"Excel / VBA\",\"SAP\",\"Power BI\"], url:null},\n];\n\nlet lang = 'en';\n\nfunction tr(v){ return (v && typeof v==='object' && ('pt' in v)) ? v[lang] : v; }\n\nfunction renderProjects(){\n  const root = document.getElementById('projList');\n  root.innerHTML = PROJECTS.map((p,i)=>{\n    const chips = p.stack.map(s=>`<span class=\"chip\">${tr(s)}<\u002Fspan>`).join('');\n    const link = p.url ? `<a class=\"view-link\" href=\"${p.url}\" target=\"_blank\" rel=\"noopener\">${lang==='pt'?'Ver dashboard ao vivo':'View live dashboard'} <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17 17 7M9 7h8v8\"/><\u002Fsvg><\u002Fa>` : '';\n    const badge = p.live ? `<span class=\"badge live\">${lang==='pt'?'Ao vivo':'Live'}<\u002Fspan>` : `<span class=\"badge case\">Case<\u002Fspan>`;\n    return `<div class=\"card ${p.live?'live':''}\" data-i=\"${i}\">\n      <button class=\"card-head\" aria-expanded=\"false\" onclick=\"toggleCard(${i})\">\n        <span class=\"card-idx\">${p.idx}<\u002Fspan>\n        <span class=\"card-tt\"><h3>${tr(p.t)}<\u002Fh3><div class=\"ct-sub\">${tr(p.sub)}<\u002Fdiv><\u002Fspan>\n        ${badge}\n        <svg class=\"chev\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m6 9 6 6 6-6\"/><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"card-body\" id=\"cb-${i}\">\n        <div class=\"card-body-inner\">\n          <p>${tr(p.body)}<\u002Fp>\n          <div class=\"insight\">${tr(p.insight)}<\u002Fdiv>\n          <div class=\"card-meta\"><div class=\"stack\">${chips}<\u002Fdiv>${link}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction toggleCard(i){\n  const card = document.querySelector(`.card[data-i=\"${i}\"]`);\n  const body = document.getElementById('cb-'+i);\n  const btn = card.querySelector('.card-head');\n  const open = card.classList.toggle('open');\n  btn.setAttribute('aria-expanded', open);\n  body.style.maxHeight = open ? body.scrollHeight + 'px' : '0';\n}\n\nfunction setLang(l){\n  lang = l;\n  document.documentElement.lang = l;\n  document.getElementById('pt-btn').classList.toggle('active', l==='pt');\n  document.getElementById('en-btn').classList.toggle('active', l==='en');\n  document.getElementById('pt-btn').setAttribute('aria-pressed', l==='pt');\n  document.getElementById('en-btn').setAttribute('aria-pressed', l==='en');\n  document.querySelectorAll('[data-i18n]').forEach(el=>{\n    const v = I18N[el.getAttribute('data-i18n')];\n    if(v) el.innerHTML = v[l];\n  });\n  // preserve open cards' heights after re-render\n  renderProjects();\n  markSvgs();\n}\n\nfunction toggleMenu(){\n  const links = document.getElementById('navLinks');\n  const btn = document.getElementById('navBurger');\n  const open = links.classList.toggle('open');\n  btn.setAttribute('aria-expanded', open);\n}\nfunction closeMenu(){\n  document.getElementById('navLinks').classList.remove('open');\n  document.getElementById('navBurger').setAttribute('aria-expanded','false');\n}\nfunction markSvgs(){\n  document.querySelectorAll('svg').forEach(s=>{\n    if(!s.hasAttribute('aria-label') && !s.hasAttribute('aria-hidden')) s.setAttribute('aria-hidden','true');\n  });\n}\ndocument.querySelectorAll('#navLinks a').forEach(a=>a.addEventListener('click', closeMenu));\nwindow.addEventListener('resize', ()=>{ if(window.innerWidth>760) closeMenu(); });\n\nrenderProjects();\nsetLang('en');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
