<style>
:root{
  --canvas:#faf9f5;--surface-soft:#f5f0e8;--surface-card:#efe9de;--cream-strong:#e8e0d2;

  --primary:#cc785c;--primary-active:#a9583e;--on-dark:#faf9f5;--on-dark-soft:#a09d96;
  --hairline:#e6dfd8;--hairline-soft:#ebe6df;--teal:#5db8a6;--amber:#e8a55a;
  --serif:'Lora',Georgia,serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;--maxw:1120px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--body);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--serif);color:var(--ink);font-weight:500;letter-spacing:-0.02em;line-height:1.12}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:28px;padding-right:28px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--primary);display:inline-flex;align-items:center;gap:8px}
.spark{display:inline-block;width:13px;height:13px;flex:none}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:rgba(250,249,245,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--hairline-soft)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:var(--maxw);margin:0 auto;padding:0 28px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-size:19px;color:var(--ink);letter-spacing:-0.02em}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-links a{font-size:14px;font-weight:500;color:var(--muted);padding:8px 12px;border-radius:8px;transition:.15s}
.nav-links a:hover{color:var(--ink);background:var(--surface-card)}
.lang-toggle{margin-left:8px;display:inline-flex;border:1px solid var(--hairline);border-radius:9999px;overflow:hidden;background:var(--canvas)}
.lang-toggle button{font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:.4px;padding:6px 13px;border:0;background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
.lang-toggle button.active{background:var(--ink);color:var(--on-dark)}
@media(max-width:760px){.nav-links a:not(:last-child){display:none}}

/* HERO */
.hero{padding-top:88px;padding-bottom:16px}
.hero h1{font-size:clamp(40px,7vw,68px);font-weight:500;letter-spacing:-0.03em;line-height:1.04;max-width:14ch;margin:20px 0 22px}
.hero .lead{font-size:clamp(17px,2.2vw,20px);color:var(--body);max-width:60ch;line-height:1.5}
.hero .lead em{color:var(--primary-active);font-style:normal;font-weight:500}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px}
.btn{font-family:var(--sans);font-size:14px;font-weight:600;padding:0 22px;height:46px;display:inline-flex;align-items:center;gap:8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:.18s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-active)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--hairline)}
.btn-ghost:hover{background:var(--surface-card);border-color:var(--cream-strong)}

/* SECTIONS */
section{padding-top:84px;padding-bottom:84px}
@media(max-width:680px){section{padding-top:52px;padding-bottom:52px}}
.sec-head{margin-bottom:40px;max-width:62ch}
.sec-head h2{font-size:clamp(28px,4vw,40px);font-weight:500;letter-spacing:-0.025em;margin:12px 0 0}
.sec-head p{margin-top:14px;color:var(--muted);font-size:16.5px}

/* KPI BAND */
.kpi-band{background:var(--surface-soft);border-top:1px solid var(--hairline-soft);border-bottom:1px solid var(--hairline-soft)}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--hairline);border:1px solid var(--hairline);border-radius:14px;overflow:hidden}
@media(max-width:780px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:460px){.kpi-grid{grid-template-columns:1fr}}
.kpi{background:var(--canvas);padding:26px 24px;display:flex;flex-direction:column;gap:6px;min-height:150px;position:relative;transition:background .2s}
.kpi:hover{background:#fff}
.kpi .num{font-family:var(--serif);font-size:40px;font-weight:500;color:var(--ink);letter-spacing:-0.03em;line-height:1}
.kpi .unit{font-size:21px;color:var(--primary);font-family:var(--serif)}
.kpi .lbl{font-size:13.5px;color:var(--muted);line-height:1.4;margin-top:auto}
.kpi .ktag{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted-soft)}
.kpi.dark{background:var(--dark)}
.kpi.dark .num,.kpi.dark .lbl{color:var(--on-dark)}
.kpi.dark .unit{color:var(--amber)}
.kpi.dark .ktag{color:var(--teal)}
.kpi.dark:hover{background:#1e1c1a}
.spark-line{position:absolute;right:18px;top:22px;width:46px;height:20px;opacity:.5}

/* PROJECT CARDS */
.proj-list{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface-card);border:1px solid var(--hairline);border-radius:13px;overflow:hidden;transition:border-color .2s}
.card.is-live{background:var(--canvas);border-color:var(--cream-strong)}
.card:hover{border-color:var(--primary)}
.card-head{display:flex;align-items:center;gap:18px;padding:22px 26px;cursor:pointer;width:100%;text-align:left;background:none;border:0;font-family:inherit}
.card-idx{font-family:var(--mono);font-size:12px;color:var(--muted-soft);width:28px;flex:none}
.card-tt{flex:1;min-width:0}
.card-tt h3{font-size:19px;font-weight:600;letter-spacing:-0.015em;line-height:1.25}
.card-tt .sub{font-size:13.5px;color:var(--muted);margin-top:3px}
.badge{font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:9999px;flex:none}
.badge.live{background:var(--primary);color:#fff}
.badge.case{background:var(--cream-strong);color:var(--body-strong)}
.chev{width:20px;height:20px;flex:none;color:var(--muted);transition:transform .25s}
.card.open .chev{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.card-body-inner{padding:2px 26px 26px 72px}
@media(max-width:560px){.card-body-inner{padding:2px 22px 24px 22px}.card-head{padding:18px 20px}}
.card-body p{font-size:15.5px;color:var(--body);line-height:1.6;max-width:70ch}
.card-body p a,.insight a{color:var(--primary-active);text-decoration:underline;text-underline-offset:2px;font-weight:500;transition:color .15s}
.card-body p a:hover,.insight a:hover{color:var(--primary)}
.insight{margin-top:14px;padding:14px 16px;background:var(--surface-soft);border-left:3px solid var(--primary);border-radius:0 8px 8px 0;font-size:14.5px;color:var(--body-strong)}
.card.is-live .insight{background:var(--surface-card)}
.card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-top:18px}
.stack{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:var(--mono);font-size:11.5px;color:var(--body);background:var(--canvas);border:1px solid var(--hairline);padding:4px 10px;border-radius:6px}
.card.is-live .chip{background:var(--surface-soft)}
.view-link{font-size:13.5px;font-weight:600;color:var(--primary-active);display:inline-flex;align-items:center;gap:6px}
.view-link:hover{text-decoration:underline}
.view-link svg{width:14px;height:14px}

/* TIMELINE */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;background:var(--hairline)}
.tl-item{position:relative;padding-bottom:34px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:"";position:absolute;left:-26px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px var(--canvas)}
.tl-item .role{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ink)}
.tl-item .org{font-size:14.5px;color:var(--body-strong);margin-top:2px}
.tl-item .when{font-family:var(--mono);font-size:12px;color:var(--muted-soft);margin-top:4px;display:block}
.tl-item ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:7px}
.tl-item li{font-size:14.5px;color:var(--body);padding-left:18px;position:relative;line-height:1.5;max-width:68ch}
.tl-item li::before{content:"–";position:absolute;left:0;color:var(--primary)}

/* SKILLS + LANGUAGES */
.cols{display:grid;grid-template-columns:1.3fr 1fr;gap:48px}
@media(max-width:780px){.cols{grid-template-columns:1fr;gap:40px}}
.skill-group{margin-bottom:22px}
.skill-group h4{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.skill-group .stack .chip{font-family:var(--sans);font-size:13px;padding:6px 13px;border-radius:9999px;background:var(--surface-card);border-color:var(--hairline)}
.lang-row{margin-bottom:16px}
.lr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.lr-name{font-size:15px;font-weight:500;color:var(--ink)}
.lr-lvl{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.meter{height:6px;background:var(--surface-card);border-radius:9999px;overflow:hidden}
.meter span{display:block;height:100%;background:var(--primary);border-radius:9999px}

/* EDU / CERTS */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:680px){.mini-grid{grid-template-columns:1fr;gap:32px}}
.mini h4{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.ei-deg{font-family:var(--serif);font-size:18px;color:var(--ink)}
.ei-sch{font-size:14px;color:var(--body)}
.ei-when{font-family:var(--mono);font-size:12px;color:var(--muted-soft);margin-top:2px}
.certs{list-style:none;display:flex;flex-direction:column;gap:9px}
.certs li{font-size:14px;color:var(--body);padding-left:18px;position:relative}
.certs li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--primary)}
.certs li b{color:var(--ink);font-weight:600}

/* FOOTER */
footer{background:var(--dark);color:var(--on-dark-soft);padding:64px 0 40px;margin-top:40px}
.f-top{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap}
footer h3{font-family:var(--serif);font-size:30px;color:var(--on-dark);font-weight:500;letter-spacing:-0.02em;max-width:18ch;line-height:1.15}
.f-contact{display:flex;flex-direction:column;gap:11px;font-size:14.5px}
.f-contact a{color:var(--on-dark);display:inline-flex;align-items:center;gap:9px;transition:.15s}
.f-contact a:hover{color:var(--amber)}
.f-contact svg{width:16px;height:16px;color:var(--on-dark-soft);flex:none}
.f-bottom{margin-top:46px;padding-top:22px;border-top:1px solid var(--dark-elevated);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12.5px;color:var(--muted-soft)}

@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>

<!-- SVG defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs><g id="sp"><path d="M8 0c.5 3.4 1.6 4.5 5 5-3.4.5-4.5 1.6-5 5-.5-3.4-1.6-4.5-5-5 3.4-.5 4.5-1.6 5-5z"/></g></defs>
</svg>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="#top" class="brand"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="n-brand"></span></a>
    <div class="nav-links">
      <a href="#projetos" id="n-0"></a>
      <a href="#experiencia" id="n-1"></a>
      <a href="#competencias" id="n-2"></a>
      <div class="lang-toggle">
        <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
        <button id="btn-pt" onclick="setLang('pt')">PT</button>
      </div>
    </div>
  </div>
</nav>

<!-- HERO -->
<header class="hero wrap" id="top">
  <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="h-tag"></span></span>
  <h1 id="h-h1"></h1>
  <p class="lead" id="h-lead"></p>
  <div class="hero-cta">
    <a href="#projetos" class="btn btn-primary"><span id="h-cta1"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
    <a href="https://linkedin.com/in/mateus.stoekly" target="_blank" rel="noopener" class="btn btn-ghost" id="h-cta2"></a>
  </div>
</header>

<!-- KPI BAND -->
<div class="kpi-band">
  <section class="wrap" style="padding-top:72px;padding-bottom:72px">
    <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="kpi-tag"></span></span>
    <div class="sec-head" style="margin-bottom:24px;margin-top:12px"><h2 id="kpi-h2"></h2></div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </section>
</div>

<!-- PROJECTS -->
<section class="wrap" id="projetos">
  <div class="sec-head">
    <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="p-tag"></span></span>
    <h2 id="p-h2"></h2>
    <p id="p-sub"></p>
  </div>
  <div class="proj-list" id="proj-list"></div>
</section>

<!-- EXPERIENCE -->
<section class="wrap" id="experiencia">
  <div class="sec-head">
    <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="e-tag"></span></span>
    <h2 id="e-h2"></h2>
  </div>
  <div class="tl" id="tl"></div>
</section>

<!-- SKILLS + LANGUAGES -->
<div style="background:var(--surface-soft);border-top:1px solid var(--hairline-soft);border-bottom:1px solid var(--hairline-soft)">
<section class="wrap" id="competencias">
  <div class="cols">
    <div>
      <div class="sec-head" style="margin-bottom:28px">
        <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="sk-tag"></span></span>
        <h2 id="sk-h2"></h2>
      </div>
      <div id="skill-groups"></div>
    </div>
    <div>
      <div class="sec-head" style="margin-bottom:28px">
        <span class="eyebrow"><svg class="spark" viewBox="0 0 16 16"><use href="#sp"/></svg><span id="lg-tag"></span></span>
        <h2 id="lg-h2"></h2>
      </div>
      <div id="lang-rows"></div>
    </div>
  </div>
</section>
</div>

<!-- EDUCATION + CERTS -->
<section class="wrap">
  <div class="mini-grid">
    <div class="mini">
      <h4 id="edu-tag"></h4>
      <div class="ei-deg" id="edu-deg"></div>
      <div class="ei-sch" id="edu-sch"></div>
      <div class="ei-when" id="edu-when"></div>
      <div class="ei-award" id="edu-award" style="margin-top:8px;font-size:13px;color:var(--primary-active);font-weight:500;line-height:1.5"></div>
      <div style="margin-top:22px">
        <h4 id="intl-tag" style="margin-top:8px"></h4>
        <div class="ei-deg" id="intl-place" style="font-size:16px"></div>
        <div class="ei-sch" id="intl-text"></div>
        <div class="ei-when" id="intl-when"></div>
      </div>
    </div>
    <div class="mini">
      <h4 id="cert-tag"></h4>
      <ul class="certs" id="cert-list"></ul>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer id="contato">
  <div class="wrap">
    <div class="f-top">
      <h3 id="foot-h"></h3>
      <div class="f-contact">
        <a id="foot-email" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><span></span></a>
        <a id="foot-li" href="#" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.4c0-1.3-.02-2.96-1.8-2.96-1.8 0-2.08 1.4-2.08 2.86V21H9z"/></svg><span></span></a>
        <a href="#top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg><span id="foot-loc"></span></a>
      </div>
    </div>
    <div class="f-bottom">
      <span id="foot-brand"></span>
      <span id="foot-note"></span>
    </div>
  </div>
</footer>

<script>
/* RENDERER */
let L = 'en';
const C = CONFIG;
const t = k => C[L][k];
const tr = v => (v && typeof v === 'object' && 'en' in v) ? v[L] : v;

function chip(c){ return `<span class="chip">${tr(c)}</span>`; }

function render(){
  document.documentElement.lang = L;
  document.getElementById('btn-en').classList.toggle('active', L==='en');
  document.getElementById('btn-pt').classList.toggle('active', L==='pt');

  // NAV
  document.getElementById('n-brand').textContent = C.name;
  ['n-0','n-1','n-2'].forEach((id,i) => document.getElementById(id).textContent = t('nav')[i]);

  // HERO
  document.getElementById('h-tag').textContent  = t('hero_tag');
  document.getElementById('h-h1').textContent   = t('hero_h1');
  document.getElementById('h-lead').innerHTML   = t('hero_lead');
  document.getElementById('h-cta1').textContent = t('cta_proj');
  document.getElementById('h-cta2').textContent = t('cta_li');

  // KPI
  document.getElementById('kpi-tag').textContent = t('kpi_tag');
  document.getElementById('kpi-h2').textContent  = t('kpi_h2');
  document.getElementById('kpi-grid').innerHTML  = C.kpis.map(k=>{
    const sp = k.sparkline ? `<svg class="spark-line" viewBox="0 0 46 20"><polyline points="${k.sparkline}" fill="none" stroke="${k.teal?'var(--teal)':'var(--primary)'}" stroke-width="1.6"/></svg>` : '';
    return `<div class="kpi${k.dark?' dark':''}">
      ${sp}
      <span class="ktag">${k.tag}</span>
      <span class="num">${k.num}<span class="unit">${k.unit}</span></span>
      <span class="lbl">${k[L]}</span>
    </div>`;
  }).join('');

  // PROJECTS
  document.getElementById('p-tag').textContent = t('proj_tag');
  document.getElementById('p-h2').textContent  = t('proj_h2');
  document.getElementById('p-sub').textContent = t('proj_sub');
  document.getElementById('proj-list').innerHTML = C.projects.map((p,i)=>{
    const d = p[L];
    const chips = p.stack.map(chip).join('');
    const link = p.url ? `<a class="view-link" href="${p.url}" target="_blank" rel="noopener">${t('view_dash')} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg></a>` : '';
    const bdg = p.live ? `<span class="badge live">${t('badge_live')}</span>` : `<span class="badge case">${t('badge_case')}</span>`;
    return `<div class="card${p.live?' is-live':''}" data-i="${i}">
      <button class="card-head" aria-expanded="false" onclick="toggleCard(${i})">
        <span class="card-idx">${p.idx}</span>
        <span class="card-tt"><h3>${d.title}</h3><div class="sub">${d.sub}</div></span>
        ${bdg}
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="card-body" id="cb-${i}">
        <div class="card-body-inner">
          <p>${d.body}</p>
          <div class="insight">${d.insight}</div>
          <div class="card-meta"><div class="stack">${chips}</div>${link}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // EXPERIENCE
  document.getElementById('e-tag').textContent = t('exp_tag');
  document.getElementById('e-h2').textContent  = t('exp_h2');
  document.getElementById('tl').innerHTML = C.experience.map(e=>{
    const d = e[L];
    const bullets = d.bullets.map(b=>`<li>${b}</li>`).join('');
    return `<div class="tl-item">
      <div class="role">${d.role}</div>
      <div class="org">${d.org}</div>
      <span class="when">${e['date_'+L]}</span>
      <ul>${bullets}</ul>
    </div>`;
  }).join('');

  // SKILLS
  document.getElementById('sk-tag').textContent = t('skills_tag');
  document.getElementById('sk-h2').textContent  = t('skills_h2');
  document.getElementById('skill-groups').innerHTML = C.skills.map(g=>`
    <div class="skill-group">
      <h4>${g[L]}</h4>
      <div class="stack">${g.chips.map(chip).join('')}</div>
    </div>`).join('');

  // LANGUAGES
  document.getElementById('lg-tag').textContent = t('lang_tag');
  document.getElementById('lg-h2').textContent  = t('lang_h2');
  document.getElementById('lang-rows').innerHTML = C.languages.map(l=>`
    <div class="lang-row">
      <div class="lr-top"><span class="lr-name">${l[L]}</span><span class="lr-lvl">${l['level_'+L]}</span></div>
      <div class="meter"><span style="width:${l.pct}%"></span></div>
    </div>`).join('');

  // EDUCATION
  document.getElementById('edu-tag').textContent  = t('edu_tag');
  document.getElementById('edu-deg').textContent  = C.education[L].degree;
  document.getElementById('edu-sch').textContent  = C.education.school;
  document.getElementById('edu-when').textContent = C.education[L].period;
  document.getElementById('edu-award').textContent = C.education['award_'+L];
  document.getElementById('intl-tag').textContent  = t('intl_tag');
  document.getElementById('intl-place').textContent = C.intl.place;
  document.getElementById('intl-text').textContent  = C.intl[L].text;
  document.getElementById('intl-when').textContent  = C.intl[L].period;

  // CERTS
  document.getElementById('cert-tag').textContent = t('cert_tag');
  document.getElementById('cert-list').innerHTML = C.certs.map(c=>`
    <li><b>${tr(c.bold)}</b> ${c.rest}</li>`).join('');

  // FOOTER
  document.getElementById('foot-h').textContent    = t('foot_h');
  document.getElementById('foot-note').textContent = t('foot_note');
  document.getElementById('foot-loc').textContent  = L==='pt' ? C.location_pt : C.location_en;
  document.getElementById('foot-brand').textContent = `${C.name} · ${L==='pt' ? C.role_pt : C.role_en}`;
  const ea = document.getElementById('foot-email');
  ea.href = 'mailto:'+C.email; ea.querySelector('span').textContent = C.email;
  const la = document.getElementById('foot-li');
  la.href = 'https://'+C.linkedin; la.querySelector('span').textContent = C.linkedin;
}

function setLang(l){
  L = l;
  // reopen any open cards after re-render
  const openCards = [...document.querySelectorAll('.card.open')].map(c=>c.dataset.i);
  render();
  openCards.forEach(i => {
    const card = document.querySelector(`.card[data-i="${i}"]`);
    const body = document.getElementById('cb-'+i);
    if(card && body){ card.classList.add('open'); body.style.maxHeight = body.scrollHeight+'px'; }
  });
}

function toggleCard(i){
  const card = document.querySelector(`.card[data-i="${i}"]`);
  const body = document.getElementById('cb-'+i);
  const open = card.classList.toggle('open');
  card.querySelector('.card-head').setAttribute('aria-expanded', open);
  body.style.maxHeight = open ? body.scrollHeight+'px' : '0';
}

render();
</script>
</body>
</html>
